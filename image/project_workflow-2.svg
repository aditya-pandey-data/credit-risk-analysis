<svg viewBox="0 0 1200 560" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">
  <rect width="1200" height="560" fill="#0d1117"/>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#b1bac4"/>
    </marker>
  </defs>

  <!-- ===== Row 1: Phases 1-3 ===== -->

  <!-- Phase 1: Data Loading -->
  <circle cx="100" cy="60" r="14" fill="#0d1117" stroke="#58a6ff" stroke-width="1.5"/>
  <text x="100" y="65" fill="#58a6ff" font-size="13" font-weight="700" text-anchor="middle">1</text>
  <rect x="40" y="90" width="220" height="84" rx="10" fill="#1f6feb" opacity="0.30" stroke="#58a6ff" stroke-width="1.5"/>
  <text x="150" y="118" fill="#e6edf3" font-size="13" font-weight="700" text-anchor="middle">Data Loading</text>
  <text x="150" y="138" fill="#b1bac4" font-size="11" text-anchor="middle">Steps 1–5</text>
  <text x="150" y="156" fill="#b1bac4" font-size="11" text-anchor="middle">32,409 applications, CSV</text>

  <path d="M260,132 L325,132" stroke="#b1bac4" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>

  <!-- Phase 2: Data Cleaning -->
  <circle cx="450" cy="60" r="14" fill="#0d1117" stroke="#56d364" stroke-width="1.5"/>
  <text x="450" y="65" fill="#56d364" font-size="13" font-weight="700" text-anchor="middle">2</text>
  <rect x="335" y="90" width="230" height="84" rx="10" fill="#238636" opacity="0.30" stroke="#56d364" stroke-width="1.5"/>
  <text x="450" y="118" fill="#e6edf3" font-size="13" font-weight="700" text-anchor="middle">Data Cleaning</text>
  <text x="450" y="138" fill="#b1bac4" font-size="11" text-anchor="middle">Steps 6–22</text>
  <text x="450" y="156" fill="#b1bac4" font-size="11" text-anchor="middle">Median imputation, remove invalid rows</text>

  <path d="M565,132 L630,132" stroke="#b1bac4" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>

  <!-- Phase 3: EDA -->
  <circle cx="755" cy="60" r="14" fill="#0d1117" stroke="#bc8cff" stroke-width="1.5"/>
  <text x="755" y="65" fill="#bc8cff" font-size="13" font-weight="700" text-anchor="middle">3</text>
  <rect x="640" y="90" width="230" height="84" rx="10" fill="#8957e5" opacity="0.30" stroke="#bc8cff" stroke-width="1.5"/>
  <text x="755" y="118" fill="#e6edf3" font-size="13" font-weight="700" text-anchor="middle">Exploratory Analysis</text>
  <text x="755" y="138" fill="#b1bac4" font-size="11" text-anchor="middle">Steps 23–35</text>
  <text x="755" y="156" fill="#b1bac4" font-size="11" text-anchor="middle">Default rate by grade, ownership, intent</text>

  <path d="M870,132 L935,132" stroke="#b1bac4" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>

  <!-- Phase 4: Model Building -->
  <circle cx="1060" cy="60" r="14" fill="#0d1117" stroke="#ff7b34" stroke-width="1.5"/>
  <text x="1060" y="65" fill="#ff7b34" font-size="13" font-weight="700" text-anchor="middle">4</text>
  <rect x="945" y="90" width="215" height="84" rx="10" fill="#db6d28" opacity="0.30" stroke="#ff7b34" stroke-width="1.5"/>
  <text x="1060" y="118" fill="#e6edf3" font-size="13" font-weight="700" text-anchor="middle">Model Building</text>
  <text x="1060" y="138" fill="#b1bac4" font-size="11" text-anchor="middle">Steps 36–45</text>
  <text x="1060" y="156" fill="#b1bac4" font-size="11" text-anchor="middle">Logistic regression, balanced classes</text>

  <!-- Connector down from row 1 to row 2 -->
  <path d="M1060,174 L1060,220 L1060,260 L860,260" stroke="#b1bac4" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>

  <!-- ===== Row 2: Phases 5-6 ===== -->

  <!-- Phase 5: Risk Scoring -->
  <circle cx="755" cy="290" r="14" fill="#0d1117" stroke="#ff7b72" stroke-width="1.5"/>
  <text x="755" y="295" fill="#ff7b72" font-size="13" font-weight="700" text-anchor="middle">5</text>
  <rect x="640" y="320" width="230" height="84" rx="10" fill="#cf222e" opacity="0.30" stroke="#ff7b72" stroke-width="1.5"/>
  <text x="755" y="348" fill="#e6edf3" font-size="13" font-weight="700" text-anchor="middle">Risk Scoring</text>
  <text x="755" y="368" fill="#b1bac4" font-size="11" text-anchor="middle">Steps 46–47</text>
  <text x="755" y="386" fill="#b1bac4" font-size="11" text-anchor="middle">0–100 score, Low / Medium / High tiers</text>

  <!-- Risk Scoring -> Tableau (down) -->
  <path d="M700,404 L640,460" stroke="#b1bac4" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
  <text x="640" y="430" fill="#8b949e" font-size="10" text-anchor="middle">visualise</text>

  <!-- Risk Scoring -> Business Translation (left) -->
  <path d="M635,360 L565,360" stroke="#b1bac4" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
  <text x="600" y="347" fill="#8b949e" font-size="10" text-anchor="middle">analyse</text>

  <!-- Tableau Dashboards -->
  <circle cx="535" cy="430" r="14" fill="#0d1117" stroke="#79c0ff" stroke-width="1.5"/>
  <text x="535" y="435" fill="#79c0ff" font-size="11" font-weight="700" text-anchor="middle">5a</text>
  <rect x="430" y="460" width="210" height="80" rx="10" fill="#0969da" opacity="0.30" stroke="#79c0ff" stroke-width="1.5"/>
  <text x="535" y="488" fill="#e6edf3" font-size="13" font-weight="700" text-anchor="middle">Tableau Dashboards</text>
  <text x="535" y="508" fill="#b1bac4" font-size="11" text-anchor="middle">Executive Overview,</text>
  <text x="535" y="524" fill="#b1bac4" font-size="11" text-anchor="middle">Credit Risk Analysis</text>

  <!-- Tableau -> Business Translation -->
  <path d="M430,495 L340,425" stroke="#b1bac4" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>

  <!-- Phase 6: Business Translation -->
  <circle cx="335" cy="290" r="14" fill="#0d1117" stroke="#56d364" stroke-width="1.5"/>
  <text x="335" y="295" fill="#56d364" font-size="13" font-weight="700" text-anchor="middle">6</text>
  <rect x="220" y="320" width="230" height="84" rx="10" fill="#1a7f37" opacity="0.32" stroke="#56d364" stroke-width="1.5"/>
  <text x="335" y="348" fill="#e6edf3" font-size="13" font-weight="700" text-anchor="middle">Business Translation</text>
  <text x="335" y="368" fill="#b1bac4" font-size="11" text-anchor="middle">Steps 48–49</text>
  <text x="335" y="386" fill="#b1bac4" font-size="11" text-anchor="middle">Approval strategy, $47.4M loss reduction</text>

</svg>
